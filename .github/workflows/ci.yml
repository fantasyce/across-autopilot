name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: bash scripts/check.sh
      - run: npm audit --audit-level high
